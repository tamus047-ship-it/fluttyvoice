<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Banowy Voice Generator</title>
  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .container {
      background: white;
      padding: 30px;
      width: 600px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 180px;
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #3a57d8;
    }

    .history {
      margin-top: 30px;
      text-align: left;
    }

    .history-item {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item audio {
      width: 200px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Banowy Voice Generator</h1>

    <textarea id="text" placeholder="Wpisz tekst..."></textarea>
    <button onclick="generate()">Generuj</button>

    <h2>Historia generacji</h2>
    <div id="history" class="history"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
